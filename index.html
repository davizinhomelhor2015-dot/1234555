<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>CROP</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1c23">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CROP">
<link href="https://fonts.googleapis.com/css2?family=gg+sans:wght@400;500;600;700&family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   CROP v2 — Discord-inspired Tactical Design
═══════════════════════════════════════════════ */
:root {
  /* Discord-like palette com toque tático */
  --bg-primary:    #1a1c23;
  --bg-secondary:  #14151a;
  --bg-tertiary:   #111217;
  --bg-accent:     #222430;
  --bg-hover:      #2a2d3a;
  --bg-active:     #32364a;
  --bg-modifier:   rgba(255,255,255,0.04);
  --bg-float:      #1e2029;

  --amber:         #d4892a;
  --amber-glow:    rgba(212,137,42,0.15);
  --amber-dim:     rgba(212,137,42,0.4);
  --green:         #3ba55c;
  --green-glow:    rgba(59,165,92,0.3);
  --red:           #ed4245;
  --blue:          #5865f2;
  --yellow:        #faa61a;
  --cyan:          #00b0f4;

  --text-normal:   #dcddde;
  --text-muted:    #72767d;
  --text-faint:    #4f545c;
  --text-bright:   #ffffff;
  --text-link:     #00aff4;

  --channels-bg:   #1a1c23;
  --server-bg:     #111217;
  --chat-bg:       #14151a;

  --divider:       rgba(255,255,255,0.06);
  --shadow:        0 2px 10px rgba(0,0,0,0.3);
  --shadow-lg:     0 8px 32px rgba(0,0,0,0.5);

  --r:    4px;
  --r2:   8px;
  --r3:   16px;

  --f: 'Noto Sans', 'Segoe UI', sans-serif;
  --ease: cubic-bezier(.4,0,.2,1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: var(--f); }
body {
  background: var(--bg-tertiary);
  color: var(--text-normal);
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none;
}
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
::selection { background: rgba(88,101,242,0.3); }

/* ══ LOGO SVG ══════════════════════════════════ */
.crop-logo {
  width: 42px; height: 42px;
  background: linear-gradient(135deg, var(--amber) 0%, #b36b15 100%);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; font-weight: 700; color: #0a0b0e;
  letter-spacing: -0.5px;
  box-shadow: 0 4px 12px rgba(212,137,42,0.4);
  flex-shrink: 0;
  user-select: none;
}
.crop-logo-sm {
  width: 32px; height: 32px; border-radius: 10px; font-size: 13px;
}

/* ══ TELA DE LOGIN ══════════════════════════════ */
#loginScreen {
  position: fixed; inset: 0; z-index: 1000;
  display: none;
  align-items: center; justify-content: center;
  background: var(--bg-tertiary);
}
#loginScreen::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse 70% 60% at 50% 0%, rgba(88,101,242,0.06), transparent 70%),
              radial-gradient(ellipse 50% 40% at 80% 100%, rgba(212,137,42,0.04), transparent);
}
.login-wrap {
  width: 100%; max-width: 420px;
  padding: 20px;
  position: relative; z-index: 1;
  animation: fadeUp .4s var(--ease) both;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }

.login-card {
  background: var(--bg-float);
  border-radius: var(--r2);
  padding: 32px 28px 24px;
  box-shadow: var(--shadow-lg);
}
.login-header { text-align: center; margin-bottom: 24px; }
.login-logo-wrap {
  display: flex; justify-content: center; margin-bottom: 14px;
}
.login-logo-big {
  width: 64px; height: 64px;
  background: linear-gradient(135deg, var(--amber) 0%, #b36b15 100%);
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; font-weight: 800; color: #0a0b0e;
  letter-spacing: -0.5px;
  box-shadow: 0 8px 24px rgba(212,137,42,0.4);
}
.login-title {
  font-size: 22px; font-weight: 700;
  color: var(--text-bright);
  margin-bottom: 4px;
}
.login-sub { font-size: 13px; color: var(--text-muted); }

.login-field { margin-bottom: 16px; }
.login-lbl {
  display: block;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.login-inp {
  width: 100%; height: 44px;
  background: var(--bg-tertiary);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--r);
  padding: 0 14px;
  font-family: var(--f); font-size: 16px;
  color: var(--text-bright);
  outline: none;
  transition: border-color .15s;
}
.login-inp:focus { border-color: var(--blue); }
.login-inp::placeholder { color: var(--text-faint); }

.login-btn {
  width: 100%; height: 44px;
  background: var(--amber);
  border: none; border-radius: var(--r);
  font-family: var(--f); font-size: 15px; font-weight: 700;
  color: #0a0b0e;
  cursor: pointer;
  transition: all .15s;
  margin-top: 4px;
}
.login-btn:hover { background: #e09432; filter: brightness(1.05); }
.login-btn:active { transform: scale(.99); }
.login-btn:disabled { opacity: .5; cursor: not-allowed; }

.login-err {
  font-size: 12px; color: var(--red);
  text-align: center; margin-top: 10px;
  min-height: 16px;
}

/* ══ APP LAYOUT — Discord style ════════════════ */
#app { display: none; height: 100vh; flex-direction: row; }
#app.on { display: flex; }

/* Coluna de servidores (ícone) */
.server-rail {
  width: 72px;
  background: var(--server-bg);
  display: flex; flex-direction: column;
  align-items: center;
  padding: 12px 0;
  gap: 8px;
  flex-shrink: 0;
  overflow-y: auto;
  scrollbar-width: none;
}
.server-rail::-webkit-scrollbar { display: none; }
.server-pill {
  position: relative;
  width: 48px; height: 48px;
  background: var(--bg-accent);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: border-radius .2s var(--ease), background .15s;
  overflow: hidden;
}
.server-pill:hover { border-radius: 14px; background: var(--amber); }
.server-pill.active { border-radius: 14px; background: var(--amber); }
.server-pill::before {
  content: '';
  position: absolute; left: -6px; top: 50%;
  transform: translateY(-50%) scaleY(0);
  width: 4px; height: 8px;
  background: var(--text-bright);
  border-radius: 0 4px 4px 0;
  transition: transform .15s var(--ease), height .15s;
}
.server-pill.active::before { transform: translateY(-50%) scaleY(1); height: 40px; }
.server-pill:hover::before { transform: translateY(-50%) scaleY(1); height: 20px; }
.server-pill .crop-logo { width: 48px; height: 48px; border-radius: 50%; }
.server-pill.active .crop-logo { border-radius: 14px; }
.server-pill:hover .crop-logo { border-radius: 14px; }
.server-sep { width: 32px; height: 2px; background: var(--divider); border-radius: 1px; margin: 2px 0; }
.server-action {
  width: 48px; height: 48px;
  background: var(--bg-accent);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 22px;
  color: var(--green);
  transition: border-radius .2s var(--ease), background .15s;
}
.server-action:hover { border-radius: 14px; background: var(--green); color: white; }

/* Sidebar de canais */
.sidebar {
  width: 240px;
  background: var(--channels-bg);
  display: flex; flex-direction: column;
  flex-shrink: 0;
}
.server-header {
  height: 48px;
  display: flex; align-items: center;
  padding: 0 16px;
  box-shadow: 0 1px 0 rgba(0,0,0,0.2);
  cursor: pointer;
  flex-shrink: 0;
  transition: background .1s;
  gap: 8px;
}
.server-header:hover { background: var(--bg-hover); }
.server-header-name {
  font-size: 15px; font-weight: 700;
  color: var(--text-bright);
  flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.server-header-chevron { color: var(--text-normal); font-size: 13px; }

/* Canais */
.channel-list {
  flex: 1; overflow-y: auto;
  padding: 8px 0;
  scrollbar-width: thin;
}
.ch-category {
  margin-top: 16px;
}
.ch-category-header {
  display: flex; align-items: center;
  padding: 0 8px 0 16px;
  height: 24px;
  cursor: pointer;
  user-select: none;
}
.ch-category-arrow {
  font-size: 10px; color: var(--text-muted);
  margin-right: 4px; transition: transform .15s;
}
.ch-category-name {
  font-size: 11px; font-weight: 700; letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--text-muted);
  flex: 1;
}
.ch-category-add {
  width: 16px; height: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: var(--text-muted);
  border-radius: 3px;
  transition: color .1s;
}
.ch-category-add:hover { color: var(--text-bright); }

.ch-item {
  display: flex; align-items: center; gap: 6px;
  padding: 0 8px 0 16px;
  height: 34px; margin: 1px 8px;
  border-radius: var(--r);
  cursor: pointer;
  color: var(--text-muted);
  transition: background .1s, color .1s;
  position: relative;
}
.ch-item:hover { background: var(--bg-modifier); color: var(--text-normal); }
.ch-item.active {
  background: var(--bg-active);
  color: var(--text-bright);
}
.ch-item-icon { font-size: 18px; flex-shrink: 0; opacity: .8; }
.ch-item-name {
  font-size: 14px; font-weight: 500;
  flex: 1; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
.ch-item.unread .ch-item-name { color: var(--text-bright); font-weight: 600; }
.ch-badge {
  background: var(--red); color: white;
  font-size: 10px; font-weight: 700;
  padding: 1px 5px; border-radius: 8px;
  min-width: 16px; text-align: center;
}

/* Usuário na base */
.user-area {
  height: 52px;
  background: rgba(0,0,0,0.2);
  display: flex; align-items: center;
  padding: 0 8px;
  gap: 8px;
  flex-shrink: 0;
}
.user-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--bg-active);
  position: relative;
  cursor: pointer;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
  overflow: hidden;
}
.user-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.user-status-dot {
  position: absolute; bottom: -1px; right: -1px;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--green);
  border: 2px solid var(--channels-bg);
  box-shadow: 0 0 5px var(--green);
}
.user-info { flex: 1; min-width: 0; cursor: pointer; }
.user-name {
  font-size: 13px; font-weight: 600;
  color: var(--text-bright);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.user-role-tag {
  font-size: 10px; color: var(--text-muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.user-actions { display: flex; gap: 2px; }
.user-action-btn {
  width: 32px; height: 32px;
  background: transparent; border: none;
  color: var(--text-muted); cursor: pointer;
  border-radius: var(--r);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: all .15s;
}
.user-action-btn:hover { background: var(--bg-hover); color: var(--text-normal); }

/* ══ CONTEÚDO PRINCIPAL ════════════════════════ */
.main {
  flex: 1; display: flex; flex-direction: column;
  overflow: hidden; background: var(--chat-bg);
  min-width: 0;
}

/* Header do canal */
.channel-header {
  height: 48px;
  display: flex; align-items: center;
  padding: 0 16px; gap: 8px;
  box-shadow: 0 1px 0 rgba(0,0,0,0.2);
  flex-shrink: 0;
  background: var(--chat-bg);
}
.mob-hamburger {
  display: none;
  width: 40px; height: 40px;
  background: transparent; border: none;
  color: var(--text-muted); cursor: pointer;
  align-items: center; justify-content: center;
  font-size: 20px; border-radius: var(--r);
  flex-shrink: 0;
}
.mob-hamburger:active { background: var(--bg-hover); }
.ch-header-icon { font-size: 20px; color: var(--text-muted); }
.ch-header-name {
  font-size: 15px; font-weight: 700;
  color: var(--text-bright);
}
.ch-header-sep { width: 1px; height: 16px; background: var(--divider); }
.ch-header-topic {
  font-size: 13px; color: var(--text-muted);
  flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.ch-header-btns { display: flex; gap: 2px; margin-left: auto; }
.ch-header-btn {
  width: 34px; height: 34px;
  background: transparent; border: none;
  color: var(--text-muted); cursor: pointer;
  border-radius: var(--r);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; transition: all .15s;
}
.ch-header-btn:hover { background: var(--bg-hover); color: var(--text-normal); }

/* Welcome */
.welcome-screen {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px; text-align: center;
}
.welcome-logo {
  width: 80px; height: 80px;
  background: linear-gradient(135deg, var(--amber) 0%, #b36b15 100%);
  border-radius: 24px;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; font-weight: 800; color: #0a0b0e;
  box-shadow: 0 8px 32px rgba(212,137,42,0.3);
  margin-bottom: 20px;
}
.welcome-title {
  font-size: 24px; font-weight: 700;
  color: var(--text-bright); margin-bottom: 8px;
}
.welcome-sub { font-size: 14px; color: var(--text-muted); }

/* Mensagens */
.messages-wrap {
  flex: 1; overflow-y: auto;
  padding: 0 0 8px;
  -webkit-overflow-scrolling: touch;
}
.day-divider {
  display: flex; align-items: center; gap: 10px;
  padding: 16px 16px 8px;
}
.day-divider::before, .day-divider::after { content: ''; flex: 1; height: 1px; background: var(--divider); }
.day-divider span {
  font-size: 11px; font-weight: 600;
  color: var(--text-muted);
  white-space: nowrap;
}

.msg-group {
  padding: 2px 16px;
  display: flex; gap: 16px;
  position: relative;
  transition: background .05s;
}
.msg-group:hover { background: var(--bg-modifier); }
.msg-group:hover .msg-actions { opacity: 1; }
.msg-group.first { padding-top: 14px; }

.msg-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  flex-shrink: 0;
  background: var(--bg-accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700;
  cursor: pointer;
  overflow: hidden;
  margin-top: 2px;
}
.msg-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.msg-avatar-gap { width: 40px; flex-shrink: 0; }

.msg-body { flex: 1; min-width: 0; }
.msg-meta {
  display: flex; align-items: baseline; gap: 8px;
  margin-bottom: 3px;
}
.msg-author {
  font-size: 14px; font-weight: 600;
  cursor: pointer;
  transition: text-decoration .1s;
}
.msg-author:hover { text-decoration: underline; }
.msg-role-badge {
  font-size: 10px; font-weight: 600;
  padding: 1px 5px; border-radius: 3px;
  letter-spacing: 0.03em;
}
.msg-time {
  font-size: 11px; color: var(--text-faint);
}
.msg-text {
  font-size: 15px; color: var(--text-normal);
  line-height: 1.55; word-break: break-word;
  white-space: pre-wrap;
}
.msg-text a { color: var(--text-link); text-decoration: none; }
.msg-text a:hover { text-decoration: underline; }
.msg-deleted { color: var(--text-faint); font-style: italic; font-size: 14px; }
.msg-edited { font-size: 11px; color: var(--text-faint); }
.msg-img {
  max-width: 360px; max-height: 260px;
  border-radius: var(--r2); margin-top: 6px;
  cursor: pointer; display: block;
}
.mention { background: rgba(88,101,242,0.2); color: #97aaf5; padding: 0 2px; border-radius: 3px; }

.msg-actions {
  position: absolute; right: 16px; top: -14px;
  background: var(--bg-float);
  border: 1px solid var(--divider);
  border-radius: var(--r2);
  padding: 3px;
  display: flex; gap: 2px;
  opacity: 0;
  transition: opacity .1s;
  z-index: 10;
  box-shadow: var(--shadow);
}
.msg-action {
  width: 30px; height: 30px;
  background: transparent; border: none;
  cursor: pointer; border-radius: var(--r);
  color: var(--text-muted); font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all .1s;
}
.msg-action:hover { background: var(--bg-hover); color: var(--text-bright); }
.msg-action.del:hover { color: var(--red); background: rgba(237,66,69,0.1); }

.typing-bar {
  height: 22px; padding: 0 16px;
  font-size: 12px; color: var(--text-muted);
  display: flex; align-items: center; gap: 6px;
}
.typing-dots span {
  display: inline-block; width: 5px; height: 5px;
  background: var(--text-muted); border-radius: 50%;
  animation: bounce 1.2s infinite;
  margin-right: 2px;
}
.typing-dots span:nth-child(2) { animation-delay: .2s; }
.typing-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)} }

/* Input */
.input-area {
  padding: 0 16px 16px;
  flex-shrink: 0;
}
.input-box {
  background: var(--bg-accent);
  border-radius: var(--r2);
  display: flex; align-items: flex-end; gap: 4px;
  padding: 4px 6px;
  border: 1px solid transparent;
  transition: border-color .15s;
}
.input-box:focus-within { border-color: rgba(88,101,242,0.4); }
.input-btn {
  width: 36px; height: 36px;
  background: transparent; border: none;
  cursor: pointer; color: var(--text-muted);
  font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--r); transition: all .15s;
  flex-shrink: 0;
}
.input-btn:hover { background: var(--bg-hover); color: var(--text-normal); }
.input-field {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text-bright);
  font-family: var(--f); font-size: 15px;
  resize: none; max-height: 140px; min-height: 36px;
  padding: 7px 4px; line-height: 1.45;
}
.input-field::placeholder { color: var(--text-faint); }
.send-btn {
  width: 36px; height: 36px;
  background: var(--blue); border: none;
  cursor: pointer; color: white;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--r); transition: all .15s;
  flex-shrink: 0;
}
.send-btn:hover { background: #4752c4; }
.send-btn:active { transform: scale(.95); }

/* ══ SIDEBAR ONLINE / MEMBROS ══════════════════ */
.members-panel {
  width: 240px;
  background: var(--channels-bg);
  border-left: 1px solid var(--divider);
  flex-shrink: 0;
  display: none;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.members-panel.visible { display: block; }
.members-section { padding: 16px 8px 4px; }
.members-section-title {
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.05em; text-transform: uppercase;
  color: var(--text-muted);
  padding: 0 8px 5px;
}
.member-item {
  display: flex; align-items: center; gap: 10px;
  padding: 5px 8px; border-radius: var(--r);
  cursor: pointer; transition: background .1s;
}
.member-item:hover { background: var(--bg-modifier); }
.member-av {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--bg-accent); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
  position: relative; overflow: hidden;
}
.member-av img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.member-dot {
  position: absolute; bottom: -1px; right: -1px;
  width: 9px; height: 9px; border-radius: 50%;
  border: 1.5px solid var(--channels-bg);
}
.member-dot.on  { background: var(--green); }
.member-dot.off { background: var(--text-faint); }
.member-info { min-width: 0; }
.member-name {
  font-size: 13px; font-weight: 500;
  color: var(--text-normal);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.member-role-name { font-size: 11px; color: var(--text-muted); }

/* ══ OVERLAY MOBILE ════════════════════════════ */
.mob-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0);
  transition: background .26s var(--ease);
  pointer-events: none;
}
.mob-overlay.open {
  background: rgba(0,0,0,0.6);
  pointer-events: all;
}

/* Botão de fechar sidebar — GRANDE e óbvio */
.mob-close-btn {
  display: none;
  position: fixed;
  bottom: calc(24px + env(safe-area-inset-bottom,0px));
  left: 50%;
  transform: translateX(-50%);
  z-index: 700;
  background: var(--bg-float);
  border: 1px solid var(--divider);
  border-radius: 24px;
  padding: 12px 24px;
  color: var(--text-bright);
  font-family: var(--f);
  font-size: 14px; font-weight: 600;
  cursor: pointer;
  box-shadow: var(--shadow-lg);
  gap: 8px;
  align-items: center;
  white-space: nowrap;
}
.mob-close-btn.show { display: flex; }

/* ══ MODAIS ════════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0; z-index: 900;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(4px);
  display: none; align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--bg-float);
  border-radius: var(--r2);
  width: 100%; max-width: 460px;
  margin: 16px;
  max-height: 90vh; overflow-y: auto;
  position: relative;
  animation: modalPop .2s var(--ease);
  box-shadow: var(--shadow-lg);
}
@keyframes modalPop { from{opacity:0;transform:scale(.95)} to{opacity:1;transform:none} }
.modal-header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--divider);
  display: flex; align-items: center; gap: 12px;
}
.modal-title { font-size: 18px; font-weight: 700; color: var(--text-bright); flex: 1; }
.modal-close {
  width: 30px; height: 30px;
  background: transparent; border: none;
  color: var(--text-muted); cursor: pointer;
  font-size: 18px; border-radius: var(--r);
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.modal-close:hover { background: var(--bg-hover); color: var(--text-bright); }
.modal-body { padding: 20px; }
.modal-footer {
  padding: 16px 20px;
  border-top: 1px solid var(--divider);
  display: flex; gap: 8px; justify-content: flex-end;
}

/* ══ FORMULÁRIOS ═══════════════════════════════ */
.form-group { margin-bottom: 16px; }
.form-label {
  display: block; font-size: 11px; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--text-muted); margin-bottom: 6px;
}
.form-input, .form-select {
  width: 100%; height: 44px;
  background: var(--bg-tertiary);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--r);
  padding: 0 14px;
  font-family: var(--f); font-size: 15px;
  color: var(--text-bright);
  outline: none;
  transition: border-color .15s;
  appearance: none;
}
.form-input:focus, .form-select:focus { border-color: var(--blue); }
.form-select { cursor: pointer; }
.form-select option { background: var(--bg-float); }

/* Botões */
.btn { padding: 9px 20px; border: none; border-radius: var(--r); font-family: var(--f); font-size: 14px; font-weight: 600; cursor: pointer; transition: all .15s; }
.btn-primary { background: var(--blue); color: white; }
.btn-primary:hover { background: #4752c4; }
.btn-amber { background: var(--amber); color: #0a0b0e; }
.btn-amber:hover { background: #e09432; }
.btn-ghost { background: transparent; color: var(--text-muted); }
.btn-ghost:hover { background: var(--bg-hover); color: var(--text-bright); }
.btn-danger { background: var(--red); color: white; }
.btn-danger:hover { filter: brightness(1.1); }
.btn-full { width: 100%; margin-bottom: 8px; }
.btn-sm { padding: 7px 14px; font-size: 13px; }

/* Cargos / Roles */
.role-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  background: var(--bg-tertiary);
  border-radius: var(--r); margin-bottom: 6px;
}
.role-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.role-name { flex: 1; font-size: 14px; font-weight: 600; }
.role-acts { display: flex; gap: 3px; }
.role-act {
  width: 26px; height: 26px; background: transparent; border: none;
  cursor: pointer; border-radius: var(--r); color: var(--text-muted);
  font-size: 13px; display: flex; align-items: center; justify-content: center;
  transition: all .1s;
}
.role-act:hover { background: var(--bg-hover); color: var(--text-bright); }

/* Perm checkboxes */
.perm-list { display: flex; flex-direction: column; gap: 10px; }
.perm-item { display: flex; align-items: center; gap: 10px; }
.perm-item input { width: 16px; height: 16px; cursor: pointer; accent-color: var(--blue); }
.perm-item label { font-size: 14px; cursor: pointer; }

/* Color swatches */
.swatches { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
.swatch {
  width: 24px; height: 24px; border-radius: 50%;
  cursor: pointer; border: 2px solid transparent; transition: all .15s;
}
.swatch:hover, .swatch.on { border-color: white; transform: scale(1.15); }

/* User manage */
.uman-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  background: var(--bg-tertiary);
  border-radius: var(--r); margin-bottom: 6px;
}
.uman-av {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--bg-active); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; overflow: hidden;
}
.uman-av img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.uman-info { flex: 1; min-width: 0; }
.uman-name { font-size: 14px; font-weight: 600; }
.uman-role { font-size: 12px; color: var(--text-muted); }

/* Toast */
.toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 1100; display: flex; flex-direction: column; gap: 8px; max-width: 320px; }
.toast {
  background: var(--bg-float);
  border-radius: var(--r2);
  padding: 12px 16px;
  font-size: 13px;
  animation: slideIn .25s var(--ease);
  box-shadow: var(--shadow-lg);
  border-left: 3px solid var(--blue);
}
.toast.s { border-color: var(--green); }
.toast.e { border-color: var(--red); }
.toast.i { border-color: var(--blue); }
@keyframes slideIn { from{opacity:0;transform:translateX(16px)} to{opacity:1;transform:none} }

/* Emoji picker */
.emoji-picker {
  position: absolute; bottom: 90px; left: 50px;
  width: 320px;
  background: var(--bg-float);
  border-radius: var(--r2);
  border: 1px solid var(--divider);
  box-shadow: var(--shadow-lg);
  z-index: 400; display: none;
}
.emoji-picker.open { display: block; }
.emoji-cats { display: flex; border-bottom: 1px solid var(--divider); padding: 4px; }
.emoji-cat-btn {
  flex: 1; padding: 6px; background: transparent; border: none;
  cursor: pointer; font-size: 16px; border-radius: var(--r); transition: background .1s;
}
.emoji-cat-btn:hover, .emoji-cat-btn.active { background: var(--bg-hover); }
.emoji-search-wrap { padding: 7px 8px; }
.emoji-search-inp {
  width: 100%; padding: 6px 10px;
  background: var(--bg-tertiary);
  border: 1px solid var(--divider);
  border-radius: var(--r);
  color: var(--text-bright); font-size: 13px; outline: none;
}
.emoji-grid {
  display: grid; grid-template-columns: repeat(8,1fr);
  gap: 1px; padding: 7px; max-height: 190px; overflow-y: auto;
}
.emoji-grid-btn {
  height: 36px; background: transparent; border: none;
  cursor: pointer; font-size: 20px; border-radius: var(--r);
  display: flex; align-items: center; justify-content: center;
  transition: background .1s;
}
.emoji-grid-btn:hover { background: var(--bg-hover); }

/* Image preview */
.img-preview-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,0.9);
  display: none; align-items: center; justify-content: center;
  cursor: pointer;
}
.img-preview-overlay.open { display: flex; }
.img-preview-overlay img { max-width: 94vw; max-height: 94vh; border-radius: var(--r2); }

/* Resultados */
.res-stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 20px; }
.res-stat {
  background: var(--bg-tertiary); border-radius: var(--r2);
  padding: 12px; text-align: center;
}
.res-stat-num { font-size: 24px; font-weight: 700; }
.res-stat-lbl { font-size: 10px; font-weight: 600; letter-spacing: 0.05em; color: var(--text-muted); text-transform: uppercase; margin-top: 2px; }
.res-card {
  background: var(--bg-tertiary);
  border-radius: var(--r2); margin-bottom: 8px;
  overflow: hidden; transition: background .1s;
}
.res-card:hover { background: var(--bg-hover); }
.res-card-main { display: flex; align-items: center; gap: 10px; padding: 12px 14px; }
.res-card-name { font-size: 15px; font-weight: 600; flex: 1; }
.res-card-obs { padding: 0 14px 10px; font-size: 12px; color: var(--text-muted); }
.res-pill {
  font-size: 11px; font-weight: 600;
  padding: 3px 9px; border-radius: 12px;
  flex-shrink: 0;
}
.res-pill.a { background: rgba(59,165,92,0.15); color: #3ba55c; }
.res-pill.r { background: rgba(237,66,69,0.15); color: #ed4245; }
.res-pill.p { background: rgba(250,166,26,0.15); color: #faa61a; }
.res-empty { text-align: center; padding: 40px; font-size: 14px; color: var(--text-muted); }

/* Painel de resultados (fullscreen) */
.res-panel {
  position: fixed; inset: 0; z-index: 800;
  background: var(--chat-bg);
  display: none; flex-direction: column;
}
.res-panel.open { display: flex; }
.res-panel-header {
  height: 52px;
  display: flex; align-items: center; gap: 12px;
  padding: 0 16px;
  box-shadow: 0 1px 0 rgba(0,0,0,0.2);
  flex-shrink: 0;
  background: var(--channels-bg);
}
.res-panel-title { font-size: 16px; font-weight: 700; color: var(--text-bright); flex: 1; }
.res-panel-content { flex: 1; overflow-y: auto; padding: 20px; }

/* Context menu */
.ctx-menu {
  position: fixed; z-index: 800;
  background: var(--bg-float);
  border: 1px solid var(--divider);
  border-radius: var(--r2);
  padding: 4px;
  min-width: 160px;
  box-shadow: var(--shadow-lg);
  display: none;
}
.ctx-menu.open { display: block; }
.ctx-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border-radius: var(--r);
  cursor: pointer; font-size: 14px; color: var(--text-normal);
  transition: background .1s;
}
.ctx-item:hover { background: var(--blue); color: white; }
.ctx-item.danger { color: var(--red); }
.ctx-item.danger:hover { background: var(--red); color: white; }
.ctx-sep { height: 1px; background: var(--divider); margin: 3px 0; }

/* Search */
.search-input {
  width: 100%; height: 38px;
  background: var(--bg-tertiary);
  border: 1px solid var(--divider); border-radius: var(--r);
  padding: 0 12px;
  font-family: var(--f); font-size: 14px;
  color: var(--text-bright); outline: none; margin-bottom: 12px;
  transition: border-color .15s;
}
.search-input:focus { border-color: var(--blue); }
.search-result-item {
  padding: 8px 12px; border-radius: var(--r);
  cursor: pointer; transition: background .1s;
}
.search-result-item:hover { background: var(--bg-hover); }
.search-result-who { font-size: 11px; color: var(--text-muted); margin-bottom: 2px; }
.search-result-text { font-size: 14px; }

/* ══ RESPONSIVO MOBILE ════════════════════════ */
@media(max-width:768px) {
  .server-rail { display: none; }
  .members-panel { display: none !important; }
}

@media(max-width:600px) {
  /* Sidebar como drawer */
  .sidebar {
    position: fixed; left: -260px; top: 0; bottom: 0;
    z-index: 600; width: 252px;
    transition: left .26s var(--ease);
    box-shadow: none;
  }
  .sidebar.open {
    left: 0;
    box-shadow: 6px 0 32px rgba(0,0,0,0.6);
  }
  .mob-overlay { display: block; }
  .mob-hamburger { display: flex; }
  .main { width: 100%; }

  /* Safe areas */
  .input-area { padding: 0 10px calc(10px + env(safe-area-inset-bottom,0px)) 10px; }
  .user-area { padding-bottom: env(safe-area-inset-bottom,0px); }

  /* Mensagens */
  .msg-group { padding: 2px 10px; }
  .msg-group.first { padding-top: 12px; }
  .msg-actions { opacity: 1; position: static; background: transparent; border: none; box-shadow: none; padding: 2px 0; margin-top: 3px; }

  /* Input */
  .input-field { font-size: 16px; }

  /* Emoji */
  .emoji-picker {
    position: fixed; left: 0; right: 0; bottom: 0; width: 100%;
    border-radius: 14px 14px 0 0;
    border-left: none; border-right: none; border-bottom: none;
    padding-bottom: env(safe-area-inset-bottom,0px);
    max-height: 52vh;
  }

  /* Modal */
  .modal-overlay { align-items: flex-end; }
  .modal-box { margin: 0; border-radius: 16px 16px 0 0; max-height: 92vh; padding-bottom: env(safe-area-inset-bottom,0px); }

  /* Resultados */
  .res-stats-grid { grid-template-columns: repeat(2,1fr); }

  /* Toast */
  .toast-container { left: 10px; right: 10px; bottom: calc(8px + env(safe-area-inset-bottom,0px)); max-width: none; }

  ::-webkit-scrollbar { width: 0; }
}
</style>
</head>
<body>

<!-- ═══ LOGIN ═══════════════════════════════════ -->
<div id="loginScreen">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo-wrap">
          <div class="login-logo-big">CR</div>
        </div>
        <div class="login-title">Bem-vindo de volta</div>
        <div class="login-sub">C.R.O.P — Sistema de Comunicações</div>
      </div>
      <div class="login-field">
        <label class="login-lbl">Identificação</label>
        <input class="login-inp" id="inUser" type="text" placeholder="Seu nome de usuário" autocomplete="username" onkeydown="if(event.key==='Enter')document.getElementById('inPass').focus()">
      </div>
      <div class="login-field">
        <label class="login-lbl">Senha</label>
        <input class="login-inp" id="inPass" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="login-btn" id="loginBtn" onclick="doLogin()">Entrar</button>
      <div class="login-err" id="loginErr"></div>
    </div>
  </div>
</div>

<!-- ═══ OVERLAY MOBILE ══════════════════════════ -->
<div class="mob-overlay" id="mobOverlay"></div>

<!-- Botão de fechar sidebar — precisa toque intencional -->
<button class="mob-close-btn" id="mobCloseBtn" onclick="closeSidebar()">
  ✕ Fechar menu
</button>

<!-- ═══ APP ═════════════════════════════════════ -->
<div id="app">
  <!-- Coluna de servidores -->
  <div class="server-rail">
    <div class="server-pill active" onclick="showCtxMenu(event,'server')" title="C.R.O.P">
      <div class="crop-logo">CR</div>
    </div>
    <div class="server-sep"></div>
    <div class="server-action" onclick="openResults()" title="Resultados">🏅</div>
  </div>

  <!-- Sidebar canais -->
  <div class="sidebar" id="sidebar">
    <div class="server-header" onclick="showCtxMenu(event,'server')">
      <span class="server-header-name">C.R.O.P</span>
      <span class="server-header-chevron">▾</span>
    </div>
    <div class="channel-list" id="channelList"></div>
    <div class="user-area">
      <div class="user-avatar" id="userAvatar" onclick="openProfile()">
        <span id="userAvatarInitials">?</span>
        <div class="user-status-dot"></div>
      </div>
      <div class="user-info" onclick="openProfile()">
        <div class="user-name" id="uName">—</div>
        <div class="user-role-tag" id="uRole">—</div>
      </div>
      <div class="user-actions">
        <button class="user-action-btn" onclick="openResults()" title="Resultados">🏅</button>
        <button class="user-action-btn" onclick="openSettings()" title="Configurações">⚙️</button>
        <button class="user-action-btn" onclick="doLogout()" title="Sair">🚪</button>
      </div>
    </div>
  </div>

  <!-- Conteúdo principal -->
  <div class="main">
    <!-- Welcome -->
    <div id="welcomeScreen" style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
      <div class="channel-header">
        <button class="mob-hamburger" onclick="openSidebar()">☰</button>
        <span style="font-size:15px;font-weight:700;color:var(--text-bright)">C.R.O.P</span>
      </div>
      <div class="welcome-screen">
        <div class="welcome-logo">CR</div>
        <div class="welcome-title">Bem-vindo à C.R.O.P</div>
        <div class="welcome-sub">Selecione um canal para começar a comunicação</div>
      </div>
    </div>

    <!-- Chat -->
    <div id="chatScreen" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
      <div class="channel-header">
        <button class="mob-hamburger" onclick="openSidebar()">☰</button>
        <span class="ch-header-icon" id="chIcon">#</span>
        <span class="ch-header-name" id="chName">—</span>
        <div class="ch-header-sep"></div>
        <span class="ch-header-topic" id="chTopic"></span>
        <div class="ch-header-btns">
          <button class="ch-header-btn" onclick="toggleMembersPanel()" title="Membros">👥</button>
          <button class="ch-header-btn" onclick="openSearchModal()" title="Buscar">🔍</button>
        </div>
      </div>
      <div class="messages-wrap" id="messagesWrap"></div>
      <div class="typing-bar" id="typingBar"></div>
      <div class="input-area">
        <div class="input-box">
          <button class="input-btn" onclick="triggerImgUpload()" title="Imagem">📎</button>
          <button class="input-btn" onclick="toggleEmoji()" title="Emoji">😀</button>
          <textarea class="input-field" id="msgInput" placeholder="Mensagem…" rows="1" onkeydown="onMsgKey(event)" oninput="autoResize(this);onTyping()"></textarea>
          <button class="send-btn" onclick="sendMsg()">▶</button>
        </div>
        <input type="file" id="imgFileInput" accept="image/*" style="display:none" onchange="onImgSelect(event)">
      </div>
    </div>
  </div>

  <!-- Painel de membros -->
  <div class="members-panel" id="membersPanel">
    <div id="membersList"></div>
  </div>
</div>

<!-- ═══ EMOJI PICKER ════════════════════════════ -->
<div class="emoji-picker" id="emojiPicker">
  <div class="emoji-cats" id="emojiCatBar"></div>
  <div class="emoji-search-wrap">
    <input class="emoji-search-inp" placeholder="Buscar emoji…" oninput="filterEmoji(this.value)">
  </div>
  <div class="emoji-grid" id="emojiGrid"></div>
</div>

<!-- ═══ CONTEXT MENU ════════════════════════════ -->
<div class="ctx-menu" id="ctxMenu"></div>

<!-- ═══ IMAGE PREVIEW ═══════════════════════════ -->
<div class="img-preview-overlay" id="imgPreview" onclick="this.classList.remove('open')">
  <img id="imgPreviewSrc" src="">
</div>

<!-- ═══ TOAST ════════════════════════════════════ -->
<div class="toast-container" id="toastContainer"></div>

<!-- ═══ MODAIS ══════════════════════════════════ -->

<!-- Perfil -->
<div class="modal-overlay" id="modalProfile">
  <div class="modal-box" style="max-width:400px">
    <div class="modal-header">
      <span class="modal-title">Meu Perfil</span>
      <button class="modal-close" onclick="closeModal('modalProfile')">✕</button>
    </div>
    <div class="modal-body">
      <div id="profileBadge" style="margin-bottom:14px"></div>
      <div class="form-group">
        <label class="form-label">Nome de exibição</label>
        <input class="form-input" id="profName" type="text">
      </div>
      <div class="form-group">
        <label class="form-label">Nova senha</label>
        <input class="form-input" id="profPass" type="password" placeholder="Deixe em branco para não alterar">
      </div>
      <div class="form-group">
        <label class="form-label">Foto de perfil</label>
        <label style="display:inline-flex;align-items:center;gap:8px;padding:8px 14px;background:var(--bg-tertiary);border:1px solid var(--divider);border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--text-normal)">
          📷 Alterar foto
          <input type="file" accept="image/*" style="display:none" onchange="uploadAvatar(event)">
        </label>
        <span id="avatarStatus" style="font-size:11px;color:var(--text-muted);margin-left:8px"></span>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalProfile')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveProfile()">Salvar</button>
    </div>
  </div>
</div>

<!-- Configurações -->
<div class="modal-overlay" id="modalSettings">
  <div class="modal-box" style="max-width:500px">
    <div class="modal-header">
      <span class="modal-title">Configurações</span>
      <button class="modal-close" onclick="closeModal('modalSettings')">✕</button>
    </div>
    <div class="modal-body">
      <div id="adminSettingsSection" style="display:none">
        <div class="form-group" style="border-bottom:1px solid var(--divider);padding-bottom:16px;margin-bottom:16px">
          <label class="form-label" style="color:var(--amber)">⚡ Canais</label>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
import { getDatabase, ref, push, set, get, update, remove, onValue, query, orderByChild, limitToLast }
  from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

// ── Config ───────────────────────────────────────
const cfg = {
  apiKey:            'AIzaSyBdxd54oFM3eWH1duC5BTdJzjGGRDLMq-Q',
  authDomain:        'mary-cb817.firebaseapp.com',
  databaseURL:       'https://mary-cb817-default-rtdb.firebaseio.com',
  projectId:         'mary-cb817',
  storageBucket:     'mary-cb817.firebasestorage.app',
  messagingSenderId: '887348832569',
  appId:             '1:887348832569:web:c6d9c32a1a1c402b8960e8'
};
const db = getDatabase(initializeApp(cfg));
const R  = p => ref(db, p.startsWith('crop-') ? p : 'crop-app/' + p);

// ── Estado ───────────────────────────────────────
let ME = null, curCh = null, msgListener = null;
let allRoles = {}, allUsers = {}, allChannels = {};
let typingTO = {}, editingMsgId = null, editingRoleId = null;
let pendingImg = null, voiceCh = null, roleColor = '#5865f2';
let resEditing = null, allResults = [];
let msgCache = {};

// ── Utils ────────────────────────────────────────
const sha = async s => {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
};
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const toast = (msg, t='i') => {
  const w = document.getElementById('toastContainer'), el = document.createElement('div');
  el.className = `toast ${t}`; el.textContent = msg;
  w.appendChild(el); setTimeout(()=>el.remove(), 3200);
};
const fmtTime = ts => new Date(ts).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
const fmtShort = ts => new Date(ts).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
const initials = n => (n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
const autoResize = el => { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,140)+'px'; };
const compress = (f,mW=800,mH=600,q=.75) => new Promise(res=>{
  const fr=new FileReader(); fr.onload=e=>{
    const img=new Image(); img.onload=()=>{
      let{width:w,height:h}=img;
      if(w>mW){h=h*mW/w;w=mW;} if(h>mH){w=w*mH/h;h=mH;}
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h); res(c.toDataURL('image/jpeg',q));
    }; img.src=e.target.result;
  }; fr.readAsDataURL(f);
});
const parseMsg = t => {
  t=esc(t);
  t=t.replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');
  t=t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/\*(.+?)\*/g,'<em>$1</em>');
  t=t.replace(/@(\w[\w\s]*)/g,'<span class="mention">@$1</span>');
  return t;
};
const hasPerm = p => { const r=allRoles[ME?.cargo]; return !!(r?.permissions?.admin||r?.permissions?.[p]); };
const PERMS = {admin:'Administrador',manageChannels:'Gerenciar Canais',manageRoles:'Gerenciar Cargos',kickMembers:'Expulsar Membros',banMembers:'Banir Membros',deleteMessages:'Apagar Mensagens'};

// ── Modal ────────────────────────────────────────
window.openModal  = id => document.getElementById(id).classList.add('open');
window.closeModal = id => document.getElementById(id).classList.remove('open');

// ── Sidebar mobile ──────────────────────────────
window.openSidebar = () => {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('mobOverlay').classList.add('open');
  document.getElementById('mobCloseBtn').classList.add('show');
  document.getElementById('mobOverlay').onclick = null; // NÃO fechar ao clicar no overlay
};
window.closeSidebar = () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('mobOverlay').classList.remove('open');
  document.getElementById('mobCloseBtn').classList.remove('show');
};

// ── Login ────────────────────────────────────────
window.doLogin = async () => {
  const un=document.getElementById('inUser').value.trim();
  const pw=document.getElementById('inPass').value;
  const er=document.getElementById('loginErr');
  const btn=document.getElementById('loginBtn');
  er.textContent='';
  if(!un||!pw){er.textContent='Preencha todos os campos.';return;}
  btn.textContent='Entrando…'; btn.disabled=true;
  try{
    const h=await sha(pw);
    const snap=await get(R('users'));
    if(!snap.exists()){er.textContent='Sem conexão.';btn.textContent='Entrar';btn.disabled=false;return;}
    let found=null,fid=null;
    snap.forEach(c=>{if((c.val().username||'').toLowerCase()===un.toLowerCase()){found=c.val();fid=c.key;}});
    if(!found){er.textContent='Usuário não encontrado.';btn.textContent='Entrar';btn.disabled=false;return;}
    if(found.banned){er.textContent='Conta banida.';btn.textContent='Entrar';btn.disabled=false;return;}
    if(found.passwordHash!==h){er.textContent='Senha incorreta.';btn.textContent='Entrar';btn.disabled=false;return;}
    ME={...found,id:fid};
    sessionStorage.setItem('crop_uid',fid);
    await update(R(`users/${fid}`),{online:true,lastSeen:Date.now()});
    startApp();
  }catch(e){er.textContent='Erro de conexão.';btn.textContent='Entrar';btn.disabled=false;}
};

const tryAutoLogin=async()=>{
  const id=sessionStorage.getItem('crop_uid'); if(!id)return false;
  try{
    const s=await get(R(`users/${id}`)); if(!s.exists())return false;
    const u=s.val(); if(u.banned)return false;
    ME={...u,id}; await update(R(`users/${id}`),{online:true,lastSeen:Date.now()}); return true;
  }catch{return false;}
};

// ── App ──────────────────────────────────────────
const startApp=()=>{
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').classList.add('on');
  updateUserBar(); listenRoles(); listenChannels(); listenMembers();
  window.addEventListener('beforeunload',()=>{if(ME)update(R(`users/${ME.id}`),{online:false,lastSeen:Date.now()});});
  if(window.innerWidth<=600){ setTimeout(()=>openSidebar(), 500); }
};

const updateUserBar=()=>{
  const r=allRoles[ME?.cargo];
  document.getElementById('uName').textContent=ME?.displayName||ME?.username||'—';
  document.getElementById('uRole').textContent=r?.name||ME?.cargo||'—';
  document.getElementById('userAvatarInitials').textContent=initials(ME?.displayName||ME?.username);
  if(ME?.avatar){
    document.getElementById('userAvatar').innerHTML=`<img src="${ME.avatar}"><div class="user-status-dot"></div>`;
  }
};

// ── Roles ────────────────────────────────────────
const listenRoles=()=>onValue(R('roles'),snap=>{
  allRoles={};
  if(snap.exists())snap.forEach(c=>{allRoles[c.key]={...c.val(),id:c.key};});
  updateUserBar(); renderMembersPanel(); renderRolesList();
});

const renderRolesList=()=>{
  const el=document.getElementById('rolesListContainer'); if(!el)return;
  el.innerHTML=Object.values(allRoles).sort((a,b)=>(a.order||99)-(b.order||99)).map(r=>`
    <div class="role-item">
      <div class="role-dot" style="background:${r.color}"></div>
      <div class="role-name">${esc(r.name)}</div>
      <div class="role-acts">
        <button class="role-act" onclick="editRole('${r.id}')">✏️</button>
        <button class="role-act" onclick="delRole('${r.id}')">🗑</button>
      </div>
    </div>`).join('');
};

const SWATCHES=['#5865f2','#d4892a','#3ba55c','#ed4245','#faa61a','#00b0f4','#eb459e','#8892a8'];
const renderSwatches=()=>{
  document.getElementById('colorSwatches').innerHTML=
    SWATCHES.map(c=>`<div class="swatch${roleColor===c?' on':''}" style="background:${c}" onclick="roleColor='${c}';renderSwatches()"></div>`).join('')+
    `<input type="color" value="${roleColor}" onchange="roleColor=this.value;renderSwatches()" style="width:24px;height:24px;border:none;background:none;cursor:pointer;padding:0">`;
};
window.renderSwatches=renderSwatches;

const renderPerms=(perms={})=>{
  document.getElementById('permList').innerHTML=Object.entries(PERMS).map(([k,v])=>`
    <div class="perm-item">
      <input type="checkbox" id="perm-${k}" ${perms[k]?'checked':''}>
      <label for="perm-${k}">${v}</label>
    </div>`).join('');
};

window.openRoleModal=()=>{
  editingRoleId=null; roleColor='#5865f2';
  document.getElementById('roleModalTitle').textContent='Criar Cargo';
  document.getElementById('roleName').value='';
  renderSwatches(); renderPerms(); openModal('modalRole');
};
window.editRole=id=>{
  const r=allRoles[id]; if(!r)return;
  editingRoleId=id; roleColor=r.color;
  document.getElementById('roleModalTitle').textContent='Editar Cargo';
  document.getElementById('roleName').value=r.name;
  renderSwatches(); renderPerms(r.permissions||{}); openModal('modalRole');
};
window.delRole=async id=>{if(!confirm('Apagar cargo?'))return;await remove(R(`roles/${id}`));toast('Cargo apagado.','i');};
window.saveRole=async()=>{
  if(!hasPerm('admin')&&!hasPerm('manageRoles'))return;
  const name=document.getElementById('roleName').value.trim();
  if(!name){toast('Informe o nome.','e');return;}
  const perms={};
  Object.keys(PERMS).forEach(k=>{if(document.getElementById('perm-'+k)?.checked)perms[k]=true;});
  const data={name,color:roleColor,permissions:perms,order:editingRoleId?(allRoles[editingRoleId]?.order||99):Object.keys(allRoles).length};
  if(editingRoleId)await update(R(`roles/${editingRoleId}`),data);
  else{const id=name.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'')+'-'+Date.now();await set(R(`roles/${id}`),data);}
  closeModal('modalRole'); toast('Cargo salvo!','s');
};

// ── Channels ─────────────────────────────────────
const listenChannels=()=>onValue(R('channels'),snap=>{
  allChannels={};
  if(snap.exists())snap.forEach(c=>{allChannels[c.key]={...c.val(),id:c.key};});
  renderChannels();
});

const renderChannels=()=>{
  const txt=Object.values(allChannels).filter(c=>c.type==='text').sort((a,b)=>a.order-b.order);
  const vc=Object.values(allChannels).filter(c=>c.type==='voice').sort((a,b)=>a.order-b.order);
  let h='';
  if(txt.length){
    h+=`<div class="ch-category"><div class="ch-category-header"><span class="ch-category-arrow">▸</span><span class="ch-category-name">Texto</span>${hasPerm('manageChannels')?`<span class="ch-category-add" onclick="openModal('modalChannel')">+</span>`:''}</div>`;
    for(const c of txt){
      const a=c.id===curCh?' active':'';
      h+=`<div class="ch-item${a}" onclick="selectChannel('${c.id}')" oncontextmenu="chCtxMenu(event,'${c.id}')"><span class="ch-item-icon">#</span><span class="ch-item-name">${esc(c.name)}</span></div>`;
    }
    h+='</div>';
  }
  if(vc.length){
    h+=`<div class="ch-category"><div class="ch-category-header"><span class="ch-category-arrow">▸</span><span class="ch-category-name">Voz</span>${hasPerm('manageChannels')?`<span class="ch-category-add" onclick="document.getElementById('newChType').value='voice';openModal('modalChannel')">+</span>`:''}</div>`;
    for(const c of vc){
      h+=`<div class="ch-item${voiceCh===c.id?' active':''}" onclick="joinVoice('${c.id}')" oncontextmenu="chCtxMenu(event,'${c.id}')"><span class="ch-item-icon">🔊</span><span class="ch-item-name">${esc(c.name)}</span></div>`;
    }
    h+='</div>';
  }
  document.getElementById('channelList').innerHTML=h;
};

const chCtxMenu=(e,id)=>{
  e.preventDefault(); if(!hasPerm('manageChannels'))return;
  showCtxMenu(e,[{label:'🗑 Excluir Canal',cls:'danger',fn:()=>delChannel(id)}]);
};
window.chCtxMenu=chCtxMenu;

window.createChannel=async()=>{
  if(!hasPerm('manageChannels'))return;
  const type=document.getElementById('newChType').value;
  const name=document.getElementById('newChName').value.trim().toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
  if(!name)return;
  const id=(type==='text'?'text-':'voice-')+name+'-'+Date.now();
  await set(R(`channels/${id}`),{name,type,order:Object.values(allChannels).filter(c=>c.type===type).length,createdAt:Date.now()});
  closeModal('modalChannel'); document.getElementById('newChName').value='';
  toast(`#${name} criado!`,'s');
};

const delChannel=async id=>{
  if(!confirm('Excluir canal?'))return;
  await remove(R(`channels/${id}`)); await remove(R(`messages/${id}`));
  if(curCh===id){curCh=null;showWelcome();}
};

// ── Select Channel ───────────────────────────────
window.selectChannel=chId=>{
  if(msgListener)msgListener();
  curCh=chId; const ch=allChannels[chId]; if(!ch)return;
  document.getElementById('chIcon').textContent='#';
  document.getElementById('chName').textContent=ch.name;
  document.getElementById('chTopic').textContent='';
  document.getElementById('msgInput').placeholder=`Mensagem #${ch.name}`;
  document.getElementById('welcomeScreen').style.display='none';
  document.getElementById('chatScreen').style.display='flex';
  renderChannels(); loadMessages(chId);
  if(window.innerWidth<=600)closeSidebar();
};
const showWelcome=()=>{
  document.getElementById('welcomeScreen').style.display='flex';
  document.getElementById('chatScreen').style.display='none';
};

// ── Messages ──────────────────────────────────────
const loadMessages=chId=>{
  const w=document.getElementById('messagesWrap'); w.innerHTML=''; msgCache={};
  const q=query(R(`messages/${chId}`),orderByChild('ts'),limitToLast(60));
  onValue(q,snap=>{
    const msgs=[]; if(snap.exists())snap.forEach(c=>{const m={...c.val(),id:c.key};msgCache[c.key]=m;msgs.push(m);});
    renderAllMsgs(msgs); scrollBottom();
    msgListener=listenNewMsgs(chId);
    listenTyping(chId);
  },{onlyOnce:true});
};

const listenNewMsgs=chId=>{
  const q=query(R(`messages/${chId}`),orderByChild('ts'),limitToLast(1));
  return onValue(q,snap=>{
    if(!snap.exists())return;
    snap.forEach(c=>{
      const m={...c.val(),id:c.key};
      if(msgCache[c.key])return;
      msgCache[c.key]=m; appendMsg(m); scrollBottom();
    });
  });
};

const renderAllMsgs=msgs=>{
  const w=document.getElementById('messagesWrap');
  let lastDate='',lastUid=null,lastTs=0;
  for(const m of msgs){
    const d=new Date(m.ts).toLocaleDateString('pt-BR');
    if(d!==lastDate){
      lastDate=d; lastUid=null;
      const sep=document.createElement('div'); sep.className='day-divider';
      sep.innerHTML=`<span>${d}</span>`; w.appendChild(sep);
    }
    const first=m.userId!==lastUid||(m.ts-lastTs)>300000;
    lastUid=m.userId; lastTs=m.ts;
    w.appendChild(buildMsg(m,first));
  }
};

const appendMsg=m=>{
  const w=document.getElementById('messagesWrap');
  const prev=Object.values(msgCache).filter(x=>x.ts<m.ts).sort((a,b)=>b.ts-a.ts)[0];
  const first=!prev||prev.userId!==m.userId||(m.ts-prev.ts)>300000;
  const el=buildMsg(m,first); el.style.animation='fadeUp .15s ease';
  w.appendChild(el);
};

const buildMsg=(m,first)=>{
  const role=allRoles[m.userCargo];
  const rc=role?.color||'#8892a8';
  const badge=role?`<span class="msg-role-badge" style="background:${rc}22;color:${rc}">${esc(role.name)}</span>`:'';
  const canDel=hasPerm('deleteMessages')||m.userId===ME?.id;
  const canEdit=m.userId===ME?.id&&!m.deleted;
  const acts=`<div class="msg-actions">${canEdit?`<button class="msg-action" onclick="editMsg('${m.id}')" title="Editar">✏️</button>`:''}<button class="msg-action" onclick="replyMsg('${m.id}')" title="Responder">↩️</button>${canDel?`<button class="msg-action del" onclick="deleteMsg('${m.id}')" title="Apagar">🗑</button>`:''}</div>`;
  let body=m.deleted?'<div class="msg-deleted">— mensagem apagada —</div>':
    `<div class="msg-text">${parseMsg(m.content||'')}</div>${m.image?`<img class="msg-img" src="${m.image}" onclick="previewImg('${m.image}')">`:''}<span class="msg-edited">${m.edited?'(editado)':''}</span>`;
  const el=document.createElement('div');
  if(first){
    el.className='msg-group first';
    const av=m.userAvatar?`<div class="msg-avatar" onclick="openUserProfile('${m.userId}')"><img src="${m.userAvatar}"></div>`:`<div class="msg-avatar" onclick="openUserProfile('${m.userId}')" style="color:${rc};background:${rc}22">${initials(m.displayName||m.username)}</div>`;
    el.innerHTML=`${av}<div class="msg-body"><div class="msg-meta"><span class="msg-author" style="color:${rc}" onclick="openUserProfile('${m.userId}')">${esc(m.displayName||m.username)}</span>${badge}<span class="msg-time">${fmtTime(m.ts)}</span></div>${body}</div>${acts}`;
  }else{
    el.className='msg-group';
    el.innerHTML=`<div class="msg-avatar-gap"></div><div class="msg-body">${body}</div>${acts}`;
  }
  el.id='msg-'+m.id; return el;
};
const scrollBottom=()=>{const w=document.getElementById('messagesWrap');w.scrollTop=w.scrollHeight;};

window.deleteMsg=async id=>{if(!confirm('Apagar?'))return;await update(R(`messages/${curCh}/${id}`),{deleted:true,content:'',image:''});};
window.editMsg=id=>{
  const m=msgCache[id]; if(!m||m.userId!==ME.id)return;
  editingMsgId=id;
  const inp=document.getElementById('msgInput'); inp.value=m.content; inp.focus();
  inp.placeholder='Editando — ESC para cancelar'; autoResize(inp);
};
window.replyMsg=id=>{
  const m=msgCache[id]; if(!m)return;
  const inp=document.getElementById('msgInput'); inp.value=`@${m.displayName||m.username} `; inp.focus();
};
const cancelEdit=()=>{
  editingMsgId=null;
  const inp=document.getElementById('msgInput'); inp.value='';
  inp.placeholder=`Mensagem #${allChannels[curCh]?.name||''}`; autoResize(inp);
};

window.onMsgKey=e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();editingMsgId?saveEdit():sendMsg();}
  if(e.key==='Escape'&&editingMsgId)cancelEdit();
};
window.sendMsg=async()=>{
  if(!curCh)return;
  const inp=document.getElementById('msgInput'); const text=inp.value.trim();
  if(!text&&!pendingImg)return;
  if(editingMsgId){await saveEdit();return;}
  const m={userId:ME.id,username:ME.username,displayName:ME.displayName||ME.username,userCargo:ME.cargo,userAvatar:ME.avatar||'',content:text,ts:Date.now()};
  if(pendingImg){m.image=pendingImg;pendingImg=null;}
  inp.value=''; autoResize(inp);
  await push(R(`messages/${curCh}`),m); scrollBottom(); clearTyping();
};
const saveEdit=async()=>{
  const c=document.getElementById('msgInput').value.trim(); if(!c)return;
  await update(R(`messages/${curCh}/${editingMsgId}`),{content:c,edited:true});
  if(msgCache[editingMsgId])msgCache[editingMsgId].content=c;

};

const renderMembersPanel=()=>{
  const el=document.getElementById('membersList');
  const byRole={};
  for(const[uid,u]of Object.entries(allUsers)){if(u.banned)continue;if(!byRole[u.cargo])byRole[u.cargo]=[];byRole[u.cargo].push({...u,id:uid});}
  const sorted=Object.entries(allRoles).sort((a,b)=>(a[1].order||99)-(b[1].order||99));
  let h=''; let onlineTotal=0;
  for(const[rid,role]of sorted){
    const ms=(byRole[rid]||[]).sort((a,b)=>(b.online?1:0)-(a.online?1:0));
    if(!ms.length)continue;
    const onlineCount=ms.filter(m=>m.online).length;
    onlineTotal+=onlineCount;
    h+=`<div class="members-section"><div class="members-section-title" style="color:${role.color}">${esc(role.name)} — ${onlineCount}/${ms.length}</div>`;
    for(const m of ms){
      const av=m.avatar?`<div class="member-av"><img src="${m.avatar}"><div class="member-dot ${m.online?'on':'off'}"></div></div>`:`<div class="member-av" style="color:${role.color};background:${role.color}22">${initials(m.displayName||m.username)}<div class="member-dot ${m.online?'on':'off'}"></div></div>`;
      h+=`<div class="member-item" onclick="openUserProfile('${m.id}')" style="opacity:${m.online?1:.5}">${av}<div class="member-info"><div class="member-name">${esc(m.displayName||m.username)}</div><div class="member-role-name">${m.online?'online':'offline'}</div></div></div>`;
    }
    h+='</div>';
  }
  el.innerHTML=h;
  // Atualizar contador no server header
  const countEl=document.querySelector('.server-header-chevron');
  if(countEl) countEl.textContent='▾';
};

const DB='https://mary-cb817-default-rtdb.firebaseio.com';
const resApi={
  getAll:async()=>{const r=await fetch(`${DB}/crop-resultados/lista.json`);const d=await r.json();if(!d||typeof d!=='object'||d.error)return[];return Object.entries(d).map(([id,v])=>({...v,id})).sort((a,b)=>(a.ts||0)-(b.ts||0));},
  add:async d=>{const r=await fetch(`${DB}/crop-resultados/lista.json`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});return r.ok;},
  update:async(id,d)=>{const r=await fetch(`${DB}/crop-resultados/lista/${id}.json`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});return r.ok;},

const loadResults=async()=>{
  const el=document.getElementById('resPanelContent');
  el.innerHTML='<div style="padding:40px;text-align:center;color:var(--text-muted)">Carregando…</div>';
  allResults=await resApi.getAll();
  const tot=allResults.length,ap=allResults.filter(r=>r.status==='Aprovado').length,rp=allResults.filter(r=>r.status==='Reprovado').length,pe=allResults.filter(r=>r.status==='Pendente').length;
  let h=`<div class="res-stats-grid">
    <div class="res-stat"><div class="res-stat-num" style="color:var(--text-bright)">${tot}</div><div class="res-stat-lbl">Total</div></div>
    <div class="res-stat"><div class="res-stat-num" style="color:var(--green)">${ap}</div><div class="res-stat-lbl">Aprovados</div></div>
    <div class="res-stat"><div class="res-stat-num" style="color:var(--red)">${rp}</div><div class="res-stat-lbl">Reprovados</div></div>
    <div class="res-stat"><div class="res-stat-num" style="color:var(--yellow)">${pe}</div><div class="res-stat-lbl">Pendentes</div></div>
  </div>`;
  if(!allResults.length)h+='<div class="res-empty">Nenhum resultado cadastrado</div>';
  else for(const r of allResults){
    const pc=r.status==='Aprovado'?'a':r.status==='Reprovado'?'r':'p';
    const ic=r.status==='Aprovado'?'✅':r.status==='Reprovado'?'❌':'⏳';
    const acts=(hasPerm('admin')||hasPerm('manageRoles'))?`<div style="display:flex;gap:4px"><button class="msg-action" onclick="showAddResult('${r.id}')">✏️</button><button class="msg-action del" onclick="delResult('${r.id}')">🗑</button></div>`:'';
    h+=`<div class="res-card"><div class="res-card-main"><span class="res-card-name">${esc(r.name)}</span><span class="res-pill ${pc}">${ic} ${esc(r.status)}</span>${acts}</div>${r.obs?`<div class="res-card-obs">${esc(r.obs)}</div>`:''}</div>`;
  }
  el.innerHTML=h;
};

window.showAddResult=id=>{
  resEditing=id;
  const r=id?allResults.find(x=>x.id===id):null;
  const html=`<div style="padding:20px">
    <div class="form-group"><label class="form-label">Nome completo</label><input class="form-input" id="resName" value="${esc(r?.name||'')}"></div>
    <div class="form-group"><label class="form-label">Status</label><select class="form-select" id="resStatus"><option value="Aprovado" ${r?.status==='Aprovado'?'selected':''}>✅ Aprovado</option><option value="Reprovado" ${r?.status==='Reprovado'?'selected':''}>❌ Reprovado</option><option value="Pendente" ${(!r||r?.status==='Pendente')?'selected':''}>⏳ Pendente</option></select></div>
    <div class="form-group"><label class="form-label">Observação</label><input class="form-input" id="resObs" value="${esc(r?.obs||'')}"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="loadResults()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveResult()">Salvar</button>
    </div>
  </div>`;
  document.getElementById('resPanelContent').innerHTML=html;
};

window.saveResult=async()=>{
  const name=(document.getElementById('resName')?.value||'').trim();
  const status=document.getElementById('resStatus')?.value||'Pendente';
  const obs=(document.getElementById('resObs')?.value||'').trim();
  if(!name){toast('Informe o nome.','e');return;}
  const btn=document.querySelector('#resPanelContent .btn-primary');
  if(btn){btn.disabled=true;btn.textContent='Salvando…';}
  try{
    if(resEditing){await resApi.update(resEditing,{name,status,obs,updatedAt:Date.now()});toast('Atualizado!','s');}
    else{await resApi.add({name,status,obs,ts:Date.now()});toast('Adicionado!','s');}
    resEditing=null; await loadResults();
  }catch(e){toast('Erro ao salvar.','e');if(btn){btn.disabled=false;btn.textContent='Salvar';}}
};

window.delResult=async id=>{
  if(!confirm('Apagar resultado?'))return;
  await resApi.delete(id); toast('Removido.','i'); await loadResults();
};

// ── Logout ────────────────────────────────────────
window.doLogout=()=>{
  if(ME)update(R(`users/${ME.id}`),{online:false});
  if(voiceCh)remove(R(`voice/${voiceCh}/${ME?.id}`));
  sessionStorage.removeItem('crop_uid'); location.reload();
};

// ── Setup padrão ──────────────────────────────────
const setupDefault=async()=>{
  const snap=await get(R('initialized')); if(snap.exists())return;
  await set(R('roles/alto-comando'),{name:'Alto Comando',color:'#d4892a',order:0,permissions:{admin:true}});
  await set(R('roles/oficial'),{name:'Oficial',color:'#5865f2',order:1,permissions:{deleteMessages:true,kickMembers:true,manageChannels:true}});
  await set(R('roles/policial'),{name:'Policial',color:'#3ba55c',order:2,permissions:{}});
  await set(R('roles/recruta'),{name:'Recruta',color:'#8892a8',order:3,permissions:{}});
  for(const[i,n]of['geral','operacoes','recrutas','avisos','denuncias'].entries())await set(R(`channels/text-${n}`),{name:n,type:'text',order:i,createdAt:Date.now()});
  for(const[i,n]of['briefing','patrulha-1','patrulha-2'].entries())await set(R(`channels/voice-${n}`),{name:n,type:'voice',order:i+10,createdAt:Date.now()});
  const leaders=[{u:'Vitor Sant',p:'vitorsant'},{u:'Caynen Xandino',p:'caynenxandino'},{u:'Mr Surfista',p:'mrsurfista'}];
  for(const l of leaders){
    const uid='user-'+l.u.replace(/\s+/g,'').toLowerCase();
    const h=await sha(l.p);
    await set(R(`users/${uid}`),{username:l.u,displayName:l.u,passwordHash:h,cargo:'alto-comando',avatar:'',banned:false,online:false,createdAt:Date.now()});
  }
  await set(R('initialized'),true);
};

const syncLeaders=async()=>{
  const leaders=[{u:'Vitor Sant',p:'vitorsant',id:'user-vitorsant'},{u:'Caynen Xandino',p:'caynenxandino',id:'user-caynenxandino'},{u:'Mr Surfista',p:'mrsurfista',id:'user-mrsurfista'}];
  for(const l of leaders){
    const h=await sha(l.p);
    const snap=await get(R(`users/${l.id}`)).catch(()=>null);
    if(snap?.exists())await update(R(`users/${l.id}`),{passwordHash:h});
    else await set(R(`users/${l.id}`),{username:l.u,displayName:l.u,passwordHash:h,cargo:'alto-comando',avatar:'',banned:false,online:false,createdAt:Date.now()});
  }
};

// ── Init ──────────────────────────────────────────
(async()=>{
  try{const rs=await get(R('roles'));if(rs.exists())rs.forEach(c=>{allRoles[c.key]={...c.val(),id:c.key};});}catch(e){}
  const ok=await tryAutoLogin();
  if(ok){startApp();return;}
  document.getElementById('loginScreen').style.display='flex';
  setupDefault().catch(console.warn);
  syncLeaders().catch(console.warn);
})();
</script>

<script>
// Fechar modais clicando no overlay
document.querySelectorAll('.modal-overlay').forEach(el=>{
  el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');});
});
// SW
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js',{scope:'./'}).catch(()=>{}));
}
</script>
